```html
<!DOCTYPE html>
<html>
<head>
<title>Shemsa Haji Clothing Store</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background:#f5f5f5;
}

header{
    background:#000;
    color:pink;
    text-align:center;
    padding:20px;
}

nav{
    background:#444;
    color:white;
    display:flex;
    justify-content:space-between;
    padding:10px 20px;
}

nav a{
    color:white;
    text-decoration:none;
    margin-right:10px;
}

.cart{
    font-weight:bold;
}

.container{
    width:90%;
    margin:auto;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

.product{
    background:white;
    width:230px;
    margin:15px;
    padding:15px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    text-align:center;
}

.product img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:10px;
}

button{
    background:#ff4d4d;
    color:white;
    border:none;
    padding:10px;
    margin-top:10px;
    border-radius:5px;
    cursor:pointer;
}

footer{
    background:#000;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:20px;
}
</style>

</head>

<body>

<header>
<h1>Shemsa Haji Clothing Store</h1>
<p>Fashion for Everyone</p>
</header>

<nav>
<div>
<a href="#">Home</a>
<a href="#">Shop</a>
<a href="#">Contact</a>
</div>

<div class="cart">
🛒 Cart: <span id="cart-count">0</span> | $<span id="cart-total">0</span>
</div>
</nav>

<div class="container">

<div class="product">
<img src="https://images.unsplash.com/photo-1520975916090-3105956dac38">
<h3>Elegant Dress</h3>
<p>$30</p>
<button onclick="addToCart(30)">Add to Cart</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1489987707025-afc232f7ea0f">
<h3>Stylish Shirt</h3>
<p>$20</p>
<button onclick="addToCart(20)">Add to Cart</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1520975661595-6453be3f7070">
<h3>Classic Jacket</h3>
<p>$45</p>
<button onclick="addToCart(45)">Add to Cart</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c">
<h3>Modern T-Shirt</h3>
<p>$15</p>
<button onclick="addToCart(15)">Add to Cart</button>
</div>

</div>

<footer>
<p>© 2026 Shemsa Haji Clothing Store</p>
</footer>

<script>
let count = 0;
let total = 0;

function addToCart(price){
    count++;
    total += price;

    document.getElementById("cart-count").innerText = count;
    document.getElementById("cart-total").innerText = total;
}
</script>

</body>
</html>
